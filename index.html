<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>My To-Do List</h1>

    <p class="subtitle">
        Organize your tasks, stay productive.
    </p>

    <div class="input-section">

        <input
            type="text"
            id="taskInput"
            placeholder="What needs to be done?"
        >

        <button id="addBtn">
            Add Task
        </button>

    </div>

    <div class="filters">

        <button data-filter="all">
            All
        </button>

        <button data-filter="active">
            Active
        </button>

        <button data-filter="completed">
            Completed
        </button>

    </div>

    <ul id="taskList"></ul>

    <div class="footer">

        <span id="taskCounter">
            0 tasks left
        </span>

        <button id="clearCompleted">
            Clear Completed
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
